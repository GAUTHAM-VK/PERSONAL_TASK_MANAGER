version: "3.9"

services:
  db:
    image: postgres:15
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_DB: personal_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: task_manager_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/personal_task_manager
      SECRET_KEY: task-manager-secret-2026
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: task_manager_frontend
    restart: always
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"

volumes:
  postgres_data: